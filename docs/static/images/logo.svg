<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <radialGradient id="face" cx="0.5" cy="0.42" r="0.55">
      <stop offset="0%" stop-color="#dbc06a"/>
      <stop offset="70%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#a8882e"/>
    </radialGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b6914"/>
      <stop offset="100%" stop-color="#6b510e"/>
    </linearGradient>
    <linearGradient id="rim-highlight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b6914"/>
      <stop offset="30%" stop-color="#dbc06a"/>
      <stop offset="70%" stop-color="#8b6914"/>
      <stop offset="100%" stop-color="#b89838"/>
    </linearGradient>
    <!-- Gutter floor: darker, recessed surface -->
    <linearGradient id="gutter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a98639"/>
      <stop offset="100%" stop-color="#b99843"/>
    </linearGradient>
    <!-- Clip to face donut (with hole punched through) -->
    <clipPath id="face-clip">
      <path fill-rule="evenodd"
            d="M 16,58 A 48,44 0 1,1 112,58 A 48,44 0 1,1 16,58 Z
               M 54,58 A 10,9 0 1,0 74,58 A 10,9 0 1,0 54,58 Z"/>
    </clipPath>
  </defs>

  <!-- Front profile donut (with hole punched through) -->
  <path fill-rule="evenodd" fill="url(#edge)"
        d="M 16,62 A 48,44 0 1,1 112,62 A 48,44 0 1,1 16,62 Z
           M 54,62 A 10,9 0 1,0 74,62 A 10,9 0 1,0 54,62 Z"/>
  <path fill-rule="evenodd" fill="url(#rim-highlight)" opacity="0.3"
        d="M 16,62 A 48,44 0 1,1 112,62 A 48,44 0 1,1 16,62 Z
           M 54,62 A 10,9 0 1,0 74,62 A 10,9 0 1,0 54,62 Z"/>

  <!-- Top face donut (transparent hole punched through) -->
  <path fill-rule="evenodd" fill="url(#face)"
        d="M 16,58 A 48,44 0 1,1 112,58 A 48,44 0 1,1 16,58 Z
           M 54,58 A 10,9 0 1,0 74,58 A 10,9 0 1,0 54,58 Z"/>

  <!-- === Carved gutter band (middle third of face, half depth) === -->
  <!-- Face spans y=14 to y=102 (cy=58 ry=44), middle third: y=43 to y=73 -->

  <!-- Gutter floor: recessed surface, clipped to face donut -->
  <rect clip-path="url(#face-clip)" fill="url(#gutter)"
        x="0" y="43" width="128" height="30"/>

  <!-- Top edge of gutter: shadow cast by the overhanging face (light from above) -->
  <line clip-path="url(#face-clip)"
        x1="0" y1="43" x2="128" y2="43"
        stroke="#5a4210" stroke-width="2" opacity="0.4"/>
  <!-- Softer shadow falloff below -->
  <line clip-path="url(#face-clip)"
        x1="0" y1="45" x2="128" y2="45"
        stroke="#6b510e" stroke-width="1.5" opacity="0.2"/>

  <!-- Bottom edge of gutter: the lip catches light from above -->
  <line clip-path="url(#face-clip)"
        x1="0" y1="73" x2="128" y2="73"
        stroke="#e2cc78" stroke-width="1" opacity="0.4"/>

  <!-- Front wall of gutter visible at bottom edge (half-depth = 2px) -->
  <rect clip-path="url(#face-clip)" fill="url(#edge)"
        x="0" y="73" width="128" height="2" opacity="0.5"/>

  <!-- === Gazelle (upper third, embossed) === -->
  <g opacity="0.45" fill="none" stroke="#b89838" stroke-linecap="round" stroke-linejoin="round">
    <ellipse cx="64" cy="32" rx="24" ry="10" stroke-width="1.2"/>
    <path d="M 50,34 C 53,28 58,26 62,28 C 64,24 68,24 70,26
             C 72,24 75,25 76,28 C 78,30 78,33 76,34"
          stroke-width="1.5"/>
    <path d="M 54,34 L 52,38" stroke-width="1"/>
    <path d="M 58,34 L 57,37" stroke-width="1"/>
    <path d="M 72,34 L 74,38" stroke-width="1"/>
    <path d="M 76,34 L 78,37" stroke-width="1"/>
  </g>

  <!-- Hole rim -->
  <ellipse cx="64" cy="58" rx="10" ry="9" fill="none" stroke="#8b6914" stroke-width="1"/>

  <!-- Top edge highlight -->
  <path d="M 16,58 A 48,44 0 0,1 112,58" fill="none" stroke="#e8d88a" stroke-width="1" opacity="0.35"/>
</svg>
